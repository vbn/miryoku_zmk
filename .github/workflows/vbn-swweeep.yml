name: 'vbn-swweeep-build'
on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      # Force the main.yml script to clone the stable v0.3 branch instead of main
      # the swweeep is also pinned to v0.3.0 branch that corresponds to this zmk
      branches: '["zmkfirmware/zmk/v0.3-branch"]'
      board: '["nice_nano_v2"]'
      shield: '["swweeep_dongle dongle_display","swweeep_left nice_view_adapter nice_view","swweeep_right nice_view_adapter nice_view","settings_reset"]'
      modules: '["badjeff/zmk-feature-split-esb/zmk-0.3"]'
      # Latency adjustments, remove display for settings_reset.
      kconfig: '["CONFIG_ZMK_DISPLAY=y\nCONFIG_ZMK_POINTING=y\nCONFIG_ZMK_SLEEP=n\nCONFIG_ZMK_PM_SOFT_OFF=y\nCONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1\nCONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=1\nCONFIG_ZMK_BLE=n\nCONFIG_ZMK_SPLIT_BLE=n\nCONFIG_ZMK_SPLIT_WIRED=n\nCONFIG_ZMK_SPLIT_ESB=y\nCONFIG_ZMK_SPLIT_ESB_PERIPHERAL_COUNT=2\nCONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048\nCONFIG_ESB_MAX_PAYLOAD_LENGTH=48\nCONFIG_MPSL_TIMESLOT_SESSION_COUNT=1\nCONFIG_ESB_TX_FIFO_SIZE=1\n#ifdef CONFIG_SHIELD_SETTINGS_RESET\nCONFIG_ZMK_DISPLAY=n\n#endif"]'
      